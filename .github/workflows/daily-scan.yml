name: Daily Scoring Scan

on:
  schedule:
    # Run at 09:00 UTC daily
    - cron: "0 9 * * *"
  workflow_dispatch:
    # Manual trigger button in GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scoring pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
        run: |
          python -m pipeline.run

      - name: Commit snapshot
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/latest.json public/history.json pipeline/storage/history.sqlite
          git diff --staged --quiet || git commit -m "chore: daily snapshot $(date -u +%Y-%m-%d)"
          git push
