# Conviction Board Configuration
# All signal-critical thresholds and scoring parameters

# =============================================================================
# GLOBAL LIQUIDITY INDEX (GLI) FILTER
# =============================================================================
# Macro filter: suppress accumulation when global liquidity is contracting
gli:
  enabled: true
  offset_days: 75                # Compare current GLI vs N days ago
  # When GLI today < GLI N days ago:
  # - strong-accumulate downgrades to accumulate
  # - accumulate downgrades to hold
  # Combined with RS and F&G filters using OR logic (aggressive)

  # Data source options (in priority order):
  # 1. Manual override in assets.yaml (gli_override: 1.05)
  # 2. TradingView chart data (when available)
  # 3. Fallback: assume neutral (no filter applied)

  # TradingView symbol for Global Liquidity Index
  tradingview_symbol: "ECONOMICS:GLI"

  # Preferred source order:
  # 1) Manual override (GLI_CURRENT / GLI_OFFSET)
  # 2) FRED composite of major central bank balance sheets
  # 3) FRED M2 proxy fallback
  use_fred_composite: true
  allow_fred_m2_fallback: true

  # Minimum share of enabled composite components required at both
  # current and offset dates to accept the composite.
  min_component_coverage: 0.60

  # Staleness guards by data frequency.
  # Daily-updated series should be fresh; monthly series can lag materially.
  staleness:
    daily_max_days: 10
    weekly_max_days: 21
    monthly_max_days: 62
    quarterly_max_days: 200

  # Component toggles (aligned to GLI panel defaults where feasible with
  # publicly accessible, scriptable series).
  components:
    fed: true
    tga: true
    rrp: true
    ecb: true
    pbc: true
    boj: true
    smaller_cb: false

  # Optional BIS CBTA endpoint for PBOC total assets.
  # Current default returns quarterly BIS-spliced %GDP for China and is converted
  # to an approximate USD level in the fetcher.
  bis:
    cbta_china_csv_url: "https://stats.bis.org/api/v1/data/WS_CBTA/Q.CN.B.XDF_R_B1GQ._Z.B?format=csv"

# =============================================================================
# RELATIVE STRENGTH (RS) vs BTC FILTER
# =============================================================================
# Compares each asset's performance against BTC over a lookback period.
# If an asset is significantly underperforming BTC, it may be better to
# simply hold BTC instead of accumulating that asset.
rs:
  enabled: true
  lookback_days: 90              # Compare RS now vs RS N days ago
  underperformance_threshold: 0.10  # 10% underperformance triggers warning
  # When asset/BTC ratio has declined by >= threshold over lookback period:
  # - Accumulation signals downgraded
  # - Warning note is added to the asset
  # Note: BTC is excluded from this filter (RS vs itself is always 1.0)

# =============================================================================
# FEAR & GREED INDEX FILTER
# =============================================================================
# Sentiment filter: suppress accumulation signals during extreme greed.
# Source: Alternative.me API (Bitcoin Fear & Greed Index)
fear_greed:
  enabled: true
  threshold: 70                   # F&G >= this triggers downgrade
  # When Fear & Greed >= threshold (Greed/Extreme Greed):
  # - strong-accumulate downgrades to accumulate
  # - accumulate downgrades to hold
  # Combined with GLI and RS filters using OR logic (aggressive)

# =============================================================================
# RSI THRESHOLDS
# =============================================================================
rsi:
  period: 14                    # RSI calculation period

  # Capitulation detection (panic selling in quality assets)
  capitulation_weekly: 30       # Weekly RSI below this = capitulation
  capitulation_daily: 30        # Daily RSI below this = deep capitulation

  # Accumulation zone detection
  oversold_daily: 32            # Daily RSI for Wyckoff dislocation
  intact_weekly: 42             # Weekly RSI must be above this for healthy structure

  # Overbought detection (pause accumulation)
  overbought_weekly: 70         # Weekly RSI above this = overbought

  # Weekly RSI slope check (filters "first leg down" scenarios)
  # If weekly RSI was above slope_high_threshold 4 weeks ago AND has dropped
  # by more than slope_drop_threshold, this is likely a correction starting,
  # not a buyable dip. Backtest: 2021 crashes all had this pattern.
  slope_high_threshold: 55      # Weekly RSI 4w ago must be above this
  slope_drop_threshold: 8       # Weekly RSI must have dropped by at least this

# =============================================================================
# COMPOSITE SCORE THRESHOLDS
# =============================================================================
composite:
  # Accumulation triggers
  accumulate_threshold: 75      # Composite must be >= this for accumulate signal

  # Stability check (week-over-week)
  stability_tolerance: -3       # Max acceptable weekly decline for "stable"

  # Stand-aside triggers (calendar week-based averages)
  # Averages multiple runs per week, then compares latest week avg to N weeks ago
  stand_aside_delta: -5         # Weekly avg delta <= this = stand aside
  stand_aside_weeks_required: 5 # Need N weeks of data before signal can trigger
  stand_aside_lookback_weeks: 5 # Compare latest week to this many weeks ago

  # Display threshold (frontend)
  min_display_score: 50         # Assets below this hidden from dashboard

# =============================================================================
# DYNAMIC TIER THRESHOLDS (computed from composite score)
# =============================================================================
tiers:
  leader: 75                    # Composite >= 75 → Leader
  runner_up: 65                 # Composite >= 65 → Runner-up
  # Below 65 → Observation

# =============================================================================
# PROMOTION THRESHOLDS (runner-up → leader)
# =============================================================================
promotion:
  composite_threshold: 75       # Composite must be >= this
  delta_30d: 8                  # 30-day trend must be >= this
  delta_7d: 2                   # 7-day trend must be >= this

# =============================================================================
# WEIGHT PROFILES BY ASSET CATEGORY (9-category taxonomy)
# Dimensions: institutional, adoption_activity, value_capture, regulatory, supply
# Omitted dimensions are excluded; composite renormalises. Wyckoff is never weighted.
# =============================================================================
weights_by_category:
  monetary-store-of-value:
    institutional: 0.40
    supply: 0.35
    regulatory: 0.25

  smart-contract-platform:
    institutional: 0.25
    adoption_activity: 0.20
    value_capture: 0.20
    supply: 0.20
    regulatory: 0.15

  defi-protocol:
    value_capture: 0.30
    adoption_activity: 0.15
    institutional: 0.20
    regulatory: 0.15
    supply: 0.20

  oracle-data:
    institutional: 0.25
    adoption_activity: 0.25
    regulatory: 0.20
    value_capture: 0.15
    supply: 0.15

  enterprise-settlement:
    institutional: 0.30
    adoption_activity: 0.25
    regulatory: 0.25
    supply: 0.20

  payments-rail:
    institutional: 0.35
    adoption_activity: 0.20
    regulatory: 0.30
    supply: 0.15

  shared-security:
    adoption_activity: 0.25
    value_capture: 0.25
    institutional: 0.20
    regulatory: 0.15
    supply: 0.15

  data-availability-modular:
    adoption_activity: 0.25
    value_capture: 0.20
    institutional: 0.20
    regulatory: 0.15
    supply: 0.20

  ai-compute-depin:
    adoption_activity: 0.25
    value_capture: 0.20
    institutional: 0.20
    supply: 0.20
    regulatory: 0.15

  # Fallback when category missing or unknown
  default:
    institutional: 0.25
    adoption_activity: 0.20
    value_capture: 0.20
    supply: 0.20
    regulatory: 0.15

# =============================================================================
# WYCKOFF PHASE DETECTION THRESHOLDS
# =============================================================================
wyckoff:
  lookback_days: 90             # Days of price history to analyze

  # Distribution phase thresholds
  distribution:
    phase_e:
      pct_from_high: 30
      trend_30d: -15
    phase_d:
      pct_from_high: 20
      trend_7d: -5
      trend_30d: -10
    phase_c:
      position_in_range: 0.8
      trend_7d: -3
      vol_ratio: 1.3
    phase_b:
      position_in_range: 0.75
      trend_30d_abs: 8
      pct_from_high: 15
    phase_a:
      position_in_range: 0.85
      trend_30d: 15

  # Accumulation phase thresholds
  accumulation:
    phase_e:
      trend_30d: 20
      trend_7d: 5
      position_in_range: 0.7
    phase_d:
      trend_30d: 10
      trend_7d: 0
      position_in_range: 0.5
    phase_c:
      position_in_range: 0.35
      trend_7d: 3
      vol_ratio: 1.2
    phase_b_to_c:
      position_min: 0.2
      position_max: 0.4
      trend_30d_abs: 10
    phase_b:
      trend_30d_abs: 12
      vol_ratio: 1.1
      position_in_range: 0.5
    phase_a:
      pct_from_high: 25
      trend_7d: -2
      trend_30d: -5

  # Trend thresholds
  markup_trend_30d: 15
  markdown_trend_30d: -15
  range_trend_30d: 8

  # Wyckoff phase scores (0-100, higher = more bullish)
  scores:
    distribution_phase_e: 20
    distribution_phase_d: 25
    distribution_phase_c: 30
    distribution_phase_b: 35
    distribution_phase_a: 40
    distribution_default: 30
    accumulation_phase_e: 90
    accumulation_phase_d: 82
    accumulation_phase_b_to_c: 70
    accumulation_phase_c: 75
    accumulation_phase_b: 60
    accumulation_phase_a: 52
    accumulation_default: 55
    re_accumulation: 65
    markup: 78
    markdown: 28
    range_upper: 55
    range_lower: 48
    range_default: 50
    uptrend: 62
    downtrend: 42
    default: 50

# =============================================================================
# DATA FETCHING
# =============================================================================
data:
  # Price history
  # Must be large enough to compute weekly RSI from 4 weeks ago:
  # need min_weekly_points + 4 = 19 distinct ISO weeks of closes.
  # 150 days yields ~21–22 ISO weeks, leaving a safe margin.
  price_history_days: 150       # Days of daily prices to fetch
  min_daily_points: 15          # Minimum points for daily RSI
  min_weekly_points: 15         # Minimum points for weekly RSI
  min_wyckoff_days: 30          # Minimum days for Wyckoff detection

  # Trend windows
  trend_7d_window: 7
  trend_30d_window: 30

# =============================================================================
# API CONFIGURATION
# =============================================================================
api:
  coingecko:
    timeout: 30
    rate_limit_delay: 3.0
    max_retries: 3

  defillama:
    timeout: 30
    request_delay: 1.0

  claude:
    timeout: 60
    max_tokens: 200

# =============================================================================
# CACHE SETTINGS
# =============================================================================
cache:
  qualitative_score_days: 7     # Days to cache Claude-generated scores
  supply_score_days: 7          # Days to cache supply analysis

# =============================================================================
# DISPLAY SETTINGS
# =============================================================================
display:
  stale_hours: 25               # Hours after which data is considered stale
