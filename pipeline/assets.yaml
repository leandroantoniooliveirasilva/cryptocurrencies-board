# Watchlist configuration
# Tiers are computed DYNAMICALLY from composite scores:
#   - Leader:      composite >= 80
#   - Runner-up:   composite >= 65
#   - Observation: composite < 65
#
# Asset Types (for weight calculation):
#   - store-of-value: BTC and similar (institutional/supply focused)
#   - smart-contract: L1 platforms like SOL, ETH, AVAX (balanced)
#   - defi: DeFi protocols like LINK, AAVE (revenue focused)
#   - infrastructure: Enterprise/infra like QNT, HBAR (institutional focused)
#
# Discovery adds/removes assets from this list. Tiers are NOT hardcoded.

assets:
  # Store of Value
  - symbol: BTC
    name: Bitcoin
    asset_type: store-of-value
    coingecko_id: bitcoin
    defillama_slug: null
    wyckoff_override: "Phase B→C"

