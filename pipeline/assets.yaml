# Watchlist configuration
# Tiers: leaders (core positions), runner_ups (promotion candidates), observation (watch only)
#
# Asset Types (for tiered weight calculation):
#   - store-of-value: BTC and similar (institutional/supply focused)
#   - smart-contract: L1 platforms like SOL, ETH, AVAX (balanced)
#   - defi: DeFi protocols like LINK, AAVE, MORPHO (revenue focused)
#   - infrastructure: Enterprise/infra like QNT, HBAR (institutional focused)
#
# Weight profiles by asset type:
#   store-of-value:    Institutional 40%, Supply 25%, Regulatory 15%, Wyckoff 15%, Revenue 5%
#   smart-contract:    Institutional 30%, Revenue 25%, Supply 20%, Regulatory 15%, Wyckoff 10%
#   defi:              Revenue 35%, Institutional 25%, Regulatory 20%, Supply 15%, Wyckoff 5%
#   infrastructure:    Institutional 35%, Regulatory 25%, Supply 20%, Revenue 10%, Wyckoff 10%

